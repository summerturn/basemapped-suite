version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: eternalmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-eternalmap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eternalmap}
      POSTGRES_DB: ${DB_NAME:-eternalmap}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eternalmap} -d ${DB_NAME:-eternalmap}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eternalmap

  redis:
    image: redis:7-alpine
    container_name: eternalmap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eternalmap

  minio:
    image: minio/minio:latest
    container_name: eternalmap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eternalmap

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: eternalmap-server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${APP_PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-eternalmap}
      DB_PASSWORD: ${DB_PASSWORD:-eternalmap}
      DB_NAME: ${DB_NAME:-eternalmap}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - eternalmap

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: eternalmap-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - eternalmap

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  eternalmap:
    driver: bridge
