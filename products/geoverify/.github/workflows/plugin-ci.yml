name: Plugin CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/pytest-geospatial/**"
      - ".github/workflows/plugin-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/pytest-geospatial/**"
      - ".github/workflows/plugin-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pytest-geospatial
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Type-check with mypy
        run: mypy src

      - name: Test with pytest and coverage
        run: pytest --cov=pytest_geospatial --cov-report=xml --cov-report=term -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/pytest-geospatial/coverage.xml
          flags: plugin-py${{ matrix.python-version }}
          fail_ci_if_error: false

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: packages/pytest-geospatial
    environment:
      name: pypi
      url: https://pypi.org/p/pytest-geospatial
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pytest-geospatial/dist/
