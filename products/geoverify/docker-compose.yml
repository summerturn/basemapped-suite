version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: geoverify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geoverify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoverify}
      POSTGRES_DB: ${POSTGRES_DB:-geoverify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geoverify} -d ${POSTGRES_DB:-geoverify}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - geoverify-internal

  redis:
    image: redis:7-alpine
    container_name: geoverify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - geoverify-internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: geoverify-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://geoverify:geoverify@postgres:5432/geoverify}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api:ro
    networks:
      - geoverify-internal
    command: uvicorn geoverify_api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    image: node:20-alpine
    container_name: geoverify-dashboard
    restart: unless-stopped
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/dashboard:/app:cached
      - /app/node_modules
    depends_on:
      - api
    networks:
      - geoverify-internal
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  redis_data:

networks:
  geoverify-internal:
    driver: bridge
