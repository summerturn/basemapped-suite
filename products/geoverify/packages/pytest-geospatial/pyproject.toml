[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pytest-geospatial"
version = "0.1.0"
description = "A pytest plugin for geospatial assertions"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "pytest-geospatial contributors" },
]
keywords = ["pytest", "geospatial", "gis", "shapely", "geopandas", "testing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Pytest",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: GIS",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "pytest>=7.0",
    "shapely>=2.0",
    "geopandas>=0.14",
    "pyproj>=3.0",
    "httpx>=0.24",
]

[project.optional-dependencies]
dev = [
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.5",
]
docs = [
    "mkdocs>=1.5",
    "mkdocs-material>=9.0",
]

[project.urls]
Homepage = "https://github.com/pytest-geospatial/pytest-geospatial"
Documentation = "https://pytest-geospatial.readthedocs.io"
Repository = "https://github.com/pytest-geospatial/pytest-geospatial"
Issues = "https://github.com/pytest-geospatial/pytest-geospatial/issues"
Changelog = "https://github.com/pytest-geospatial/pytest-geospatial/blob/main/CHANGELOG.md"

[project.entry-points."pytest11"]
geospatial = "pytest_geospatial.plugin"

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/CHANGELOG.md",
    "/LICENSE",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pytest_geospatial"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
markers = [
    "geo: mark test as a geospatial test that may use spatial assertions.",
    "slow_geo: mark test as a slow geospatial test (e.g., large dataset operations).",
    "crs: mark test as requiring CRS validation or projection logic.",
]

[tool.coverage.run]
source = ["src/pytest_geospatial"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
show_missing = true
skip_covered = false

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312", "py313"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.git
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
target-version = "py310"
line-length = 100
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
    "D",   # pydocstyle
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "D100",  # Missing docstring in public module
    "D104",  # Missing docstring in public package
    "D107",  # Missing docstring in __init__
]

[tool.ruff.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
ignore_missing_imports = true
show_error_codes = true

[tool.hatch.version]
path = "src/pytest_geospatial/__init__.py"
