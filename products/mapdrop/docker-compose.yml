version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mapdrop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mapdrop
      POSTGRES_PASSWORD: mapdrop_dev_pass
      POSTGRES_DB: mapdrop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapdrop -d mapdrop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mapdrop-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapdrop-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mapdrop:mapdrop_dev_pass@postgres:5432/mapdrop
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "3004:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: mapdrop-internal
